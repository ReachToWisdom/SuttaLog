<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- 연꽃 SVG — 핑크/마젠타 톤 -->
  <!-- 뒷면 꽃잎 (어두운 핑크) -->
  <ellipse cx="20" cy="28" rx="7" ry="11" fill="#E91E8C" transform="rotate(-30 20 28)" opacity="0.85"/>
  <ellipse cx="20" cy="28" rx="7" ry="11" fill="#E91E8C" transform="rotate(30 20 28)" opacity="0.85"/>
  <ellipse cx="20" cy="28" rx="7" ry="11" fill="#C2185B" transform="rotate(-70 20 28)" opacity="0.75"/>
  <ellipse cx="20" cy="28" rx="7" ry="11" fill="#C2185B" transform="rotate(70 20 28)" opacity="0.75"/>
  <!-- 가운데 꽃잎 (밝은 핑크) -->
  <ellipse cx="20" cy="26" rx="6" ry="12" fill="#F06292" transform="rotate(-15 20 26)"/>
  <ellipse cx="20" cy="26" rx="6" ry="12" fill="#F06292" transform="rotate(15 20 26)"/>
  <ellipse cx="20" cy="24" rx="5.5" ry="13" fill="#EC407A"/>
  <!-- 안쪽 꽃잎 하이라이트 -->
  <ellipse cx="20" cy="25" rx="3.5" ry="9" fill="#F48FB1" opacity="0.6"/>
  <!-- 꽃술 -->
  <circle cx="20" cy="20" r="4" fill="#FDD835"/>
  <circle cx="20" cy="20" r="2.5" fill="#F9A825"/>
  <circle cx="20" cy="20" r="1.5" fill="#FFF9C4" opacity="0.8"/>
</svg>
