<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/SuttaLog/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- 브라우저 캐시 완전 방지 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#D4760A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/SuttaLog/manifest.json" />
    <title>빠알리어 공부1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- 서비스워커 등록 — 빌드 타임스탬프로 캐시 버전 관리 -->
    <script>
      if ('serviceWorker' in navigator) {
        // BUILD_TIME은 vite.config.ts의 define으로 빌드 시 주입됨
        // 개발 환경에서는 Date.now() 사용
        const buildTime = typeof __BUILD_TIME__ !== 'undefined'
          ? __BUILD_TIME__
          : Date.now().toString()

        // 등록 전에 캡처 — 기존 SW 컨트롤러 여부 (최초 설치 vs 업데이트 구분)
        const hadController = !!navigator.serviceWorker.controller

        // controllerchange: SW 컨트롤러가 실제로 교체될 때만 발생
        // hadController=false(최초 설치)이면 reload 안 함 → 무한 루프 차단
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (hadController) {
            window.location.reload()
          }
        })

        navigator.serviceWorker.register('/SuttaLog/sw.js?v=' + buildTime)
      }
    </script>
  </body>
</html>
