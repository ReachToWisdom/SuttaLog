<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/SuttaLog/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- 브라우저 캐시 완전 방지 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#D4760A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/SuttaLog/manifest.json" />
    <title>빠알리어 공부1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- 서비스워커 등록 — 빌드 타임스탬프로 캐시 버전 관리 -->
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return

        var h = location.hostname
        var isDev =
          h === 'localhost' ||
          h === '127.0.0.1' ||
          h === '0.0.0.0' ||
          /^192\.168\./.test(h) ||
          /^10\./.test(h) ||
          h.endsWith('.local')

        if (isDev) {
          // dev: SW 등록하지 않음 + 기존 SW/캐시 자동 해제 → controllerchange reload 루프 차단
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister() })
          })
          if (window.caches) {
            caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k) }) })
          }
          return
        }

        // production: SW 등록만. 강제 reload는 하지 않음.
        // 새 빌드는 사용자가 페이지를 닫았다 다시 열 때 자연스럽게 적용됨.
        // (controllerchange + reload 조합은 GitHub Pages 캐시와 만나면 reload 루프가 생김)
        var buildTime = typeof __BUILD_TIME__ !== 'undefined' ? __BUILD_TIME__ : Date.now().toString()
        navigator.serviceWorker.register('/SuttaLog/sw.js?v=' + buildTime)
      })()
    </script>
  </body>
</html>
